x-build: &build
  context: .
  args:
    CUDA: ${CUDA:-true}

services:
  train:
    build: *build
    entrypoint: ["torchkrates-train"]
    command: ["--config", "/workspace/config.yaml"]
    volumes:
      - ./data:/workspace/data
      - ./checkpoints:/workspace/checkpoints
      - ./logs:/workspace/logs
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, capabilities: [gpu]}]

  eval:
    build: *build
    entrypoint: ["torchkrates-eval"]
    volumes:
      - ./data:/workspace/data
      - ./output:/workspace/output
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, capabilities: [gpu]}]

  metric:
    build: *build
    entrypoint: ["torchkrates-metric"]
    volumes:
      - ./data:/workspace/data
      - ./models:/workspace/models
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, capabilities: [gpu]}]

  preprocess:
    build: *build
    entrypoint: ["torchkrates-preprocess"]
    volumes:
      - ./data:/workspace/data

  merge:
    build: *build
    entrypoint: ["torchkrates-merge"]
    volumes:
      - ./data:/workspace/data

  dev:
    build: *build
    entrypoint: ["/bin/bash"]
    stdin_open: true
    tty: true
    volumes:
      - .:/workspace
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, capabilities: [gpu]}]
