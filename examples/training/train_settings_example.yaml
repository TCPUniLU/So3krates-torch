GENERAL:
  name_exp: my_model
  checkpoints_dir: ./checkpoints
  model_dir: ./model
  log_dir: ./logs
  default_dtype: float64
  seed: 100

ARCHITECTURE:
  activation_fn: silu
  r_max: 6.
  r_max_lr: 12.0
  cutoff_fn: phys
  degrees: [1,2,3,4]
  dispersion_energy_bool: true
  dispersion_energy_scale: 1.2
  dispersion_energy_cutoff_lr_damping: 2.0  # required when dispersion_energy_bool: true
  electrostatic_energy_bool: true
  electrostatic_energy_scale: 4.0
  energy_activation_fn: silu
  energy_learn_atomic_type_scales: true
  energy_learn_atomic_type_shifts: true
  energy_regression_dim: 128
  input_convention: positions
  layer_normalization_1: true
  layer_normalization_2: true
  message_normalization: avg_num_neighbors
  num_features: 128
  num_heads: 4
  num_layers: 3
  num_radial_basis_fn: 32
  qk_non_linearity: identity
  radial_basis_fn: bernstein
  residual_mlp_1: true
  residual_mlp_2: false
  use_charge_embed: true
  use_spin_embed: true
  zbl_repulsion_bool: true
  neighborlist_format_lr: sparse
  use_pme: false  # true = PME electrostatics for periodic systems (requires torch-pme)
  # pme_smearing: 1.2       # Ewald splitting (Å); default = r_max / 5
  # pme_mesh_spacing: 0.6   # FFT grid spacing (Å); default = smearing / 2
  # Run: torchkrates-tune-pme --data train.xyz --r_max 6.0 to tune smearing/mesh_spacing.
  # Combined mode: use_pme: true + dispersion_energy_bool: true gives PME electrostatics
  # + real-space vdW-QDO dispersion (C6+C8+C10). r_max_lr and
  # dispersion_energy_cutoff_lr_damping are still required for dispersion.
  # Dispersion converges as 1/r_max_lr^3; real-space is accurate without PME.
  compute_avg_num_neighbors: True

TRAINING:
  batch_size: 5
  valid_batch_size: 5
  weight_decay: 0.
  lr: 0.001
  optimizer: adam
  amsgrad: True
  # betas: [0.9, 0.999]          # Adam/AdamW first and second moment coefficients
  # eps: 1.e-8                    # numerical stability term for Adam/AdamW
  scheduler: exponential_decay
  lr_scheduler_gamma: 0.85
  energy_weight: 0.
  forces_weight: 1000.
  # charges_weight: 0.   # partial charge MSE loss; requires REF_charges per-atom array in training data
  # hirshfeld_weight: 0. # Hirshfeld ratio MSE loss; requires REF_hirsh_ratios per-atom array
  eval_interval: 1
  num_epochs: 5
  path_to_train_data: ./path/to/train/data
  valid_ratio: 0.1
  clip_grad: 10.0
  patience: 50
  # lazy_loading: false       # on-the-fly preprocessing from raw HDF5 (default: false)
  # num_workers: 4            # DataLoader worker processes (only with lazy_loading)
  # prefetch_factor: 2        # batches prefetched per worker (only with lazy_loading)
  # num_neighbor_samples: 1000  # structures sampled for avg_num_neighbors estimate
  # --- Per-config-type loss weight multipliers ---
  # Structures are tagged with atoms.info["config_type"] in the data file.
  # Each type's loss contribution is scaled by its weight (default: 1.0).
  # config_type_weights:
  #   Default: 1.0
  #   dissociation: 2.0    # upweight dissociation structures 2x in the loss
  # --- Data replay (for fine-tuning) ---
  # replay_datasets:            # paths to replay datasets (XYZ, raw/preprocessed HDF5)
  #   - /path/to/pretrain_A.xyz
  #   - /path/to/pretrain_B.h5
  # replay_fractions: [0.7, 0.3]  # fraction of replay_total from each dataset (must sum to 1.0)
  # replay_total: 5000            # total number of replay structures to sample
  # replay_oversample_finetune: true   # repeat fine-tune data to match replay size (default: true)
  # replay_resample_per_epoch: false   # re-draw replay subset each epoch (default: false)
  # --- EWC / reEWC (forgetting-aware fine-tuning) ---
  # Elastic Weight Consolidation prevents catastrophic forgetting by adding a
  # penalty that keeps parameters close to their pretrained values, weighted
  # by their Fisher importance on the pretraining dataset.
  # reEWC = EWC + replay: enable both blocks below simultaneously.
  # use_ewc: false                     # enable EWC regularisation (default: false)
  # ewc_lambda: 1.e6                   # regularisation strength λ (paper default: 1e6)
  # ewc_fisher_data: /path/to/pretrain_subset.xyz
  #   # Path to a subset of the PRETRAINING dataset for Fisher estimation.
  #   # Use the same format as replay_datasets (XYZ, raw/preprocessed HDF5).
  #   # Must NOT be the fine-tuning training or validation set — EWC protects
  #   # parameters important for OLD knowledge, so Fisher must be computed on
  #   # pretraining data.  Can be the same file as replay_datasets.
  # ewc_num_fisher_samples: 1000       # number of STRUCTURES (not batches) to use;
  #                                    # batches of size `batch_size` are drawn until
  #                                    # this many structures have been processed
  # --- LoRA+ optimizer (use with finetune_choice: lora / dora / vera) ---
  # use_lora_plus: false           # apply a separate LR to LoRA B matrices
  # lora_B_lr: 0.01                # B-matrix LR (e.g. 10x the base lr)


MISC:
  device: cpu
  distributed: false  # set true for multi-GPU DDP training
  # launcher: torchrun  # slurm | torchrun | mpi (required when distributed: true)
